[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["data", "notebooks", "chroma_db", "mlruns"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C4"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = false
warn_unused_ignores = true
exclude = ["data/", "notebooks/", "chroma_db/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "integration: tests that hit external services (SEC EDGAR, Groq) or load the local embedding model",
    "slow: tests that take more than a few seconds",
]
